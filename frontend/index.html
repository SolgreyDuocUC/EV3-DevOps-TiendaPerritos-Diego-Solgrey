<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tienda de Alimentos para Perritos 🐶</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- VARIABLES DE DISEÑO (Azul Premium & Estilo UI Moderno) --- */
    :root {
      --primary: #2563eb;           /* Azul vibrante principal */
      --primary-hover: #1d4ed8;     /* Azul profundo */
      --primary-light: #eff6ff;     /* Fondo azul sutil */
      --secondary: #64748b;
      --secondary-hover: #475569;
      --danger: #df2c2c;
      --danger-light: #fdf2f2;
      --success: #16a34a;
      --success-light: #f0fdf4;
      
      --bg-body: #f1f5f9;           /* Gris ultra claro de fondo */
      --bg-card: #ffffff;
      --text-main: #0f172a;         /* Texto casi negro para contraste */
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      
      /* Radios de curvatura al estilo del banner de referencia */
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 24px; 
      
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-md: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- RESET & BASE --- */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* --- HEADER (Estilo barra de navegación limpia) --- */
    header {
      background: linear-gradient(135deg, #1e40af, var(--primary));
      color: white;
      padding: 35px 24px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    header h1 {
      margin: 0 0 6px 0;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    header p {
      margin: 0;
      opacity: 0.85;
      font-size: 1rem;
      font-weight: 500;
    }

    header code {
      background: rgba(255, 255, 255, 0.15);
      padding: 3px 8px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    /* --- CONTENEDOR PRINCIPAL DISPUESTO EN REJILLA --- */
    main {
      max-width: 1280px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 32px;
    }

    @media (min-width: 1024px) {
      main {
        grid-template-columns: 1.5fr 1fr;
        align-items: start;
      }
    }

    /* --- TARJETAS ESTILO E-COMMERCE (Bordes muy redondeados) --- */
    section {
      background: var(--bg-card);
      padding: 32px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    section h2 {
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* --- BOTONES ESTILO PILL/RELAJADO --- */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 24px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 9999px; /* Botones completamente ovalados estilo la app de ref */
      cursor: pointer;
      transition: var(--transition);
      background-color: var(--primary);
      color: white;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }

    button:hover {
      background-color: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    /* Botón Secundario Cancele/Borde */
    button.secondary {
      background-color: #ffffff;
      color: var(--secondary);
      border: 1px solid var(--border-color);
      box-shadow: none;
    }
    button.secondary:hover {
      background-color: var(--primary-light);
      color: var(--primary);
      border-color: transparent;
      box-shadow: none;
    }

    /* Botón Peligro/Eliminar */
    button.danger {
      background-color: transparent;
      color: var(--danger);
      box-shadow: none;
    }
    button.danger:hover {
      background-color: var(--danger-light);
      transform: none;
      box-shadow: none;
    }

    /* --- TABLA LIMPIA Y MODERNA --- */
    .table-container {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      background-color: #f8fafc;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 18px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover {
      background-color: #f8fafc;
    }

    /* --- CONTROLES DE FORMULARIO E-COMMERCE --- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 640px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .full-width { grid-column: span 2; }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-main);
    }

    input, textarea {
      width: 100%;
      padding: 14px 18px;
      font-size: 0.95rem;
      font-family: inherit;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      background-color: #f8fafc; /* Fondo gris sutil para inputs */
      transition: var(--transition);
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background-color: #ffffff;
      box-shadow: 0 0 0 4px var(--primary-light);
    }

    /* --- FEEDBACK NOTIFICACIÓN --- */
    .status {
      margin-top: 20px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      display: none;
    }

    .status.ok {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--success);
      background-color: var(--success-light);
      border: 1px solid #bbf7d0;
    }
  </style>
</head>
<body>

  <header>
    <h1>Tienda de Alimentos para Perritos 🐶</h1>
    <p>Panel de Administración adaptado a microservicios con <code>Docker</code></p>
  </header>

  <main>
    <section>
      <h2>
        <svg width="22" height="22" fill="none" stroke="var(--primary)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
        Inventario de Productos
      </h2>
      
      <div class="btn-group">
        <button id="btnCargar">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"></path></svg>
          Sincronizar Stock
        </button>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th style="text-align: right;">Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyProductos">
            </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 id="formTitle">
        <svg width="22" height="22" fill="none" stroke="var(--primary)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        <span>Nuevo Producto</span>
      </h2>
      
      <form id="productForm" onsubmit="return false;">
        <input type="hidden" id="productoId" />
        
        <div class="form-grid">
          <div class="form-group">
            <label for="nombre">Nombre del Producto</label>
            <input type="text" id="nombre" placeholder="Ej: Alimento Cachorro Pro" required />
          </div>
          
          <div class="form-group">
            <label for="precio">Precio ($)</label>
            <input type="number" id="precio" step="0.01" min="0" placeholder="Ej: 14990" required />
          </div>
          
          <div class="form-group full-width">
            <label for="stock">Stock Disponible</label>
            <input type="number" id="stock" min="0" placeholder="Ej: 24" required />
          </div>

          <div class="form-group full-width">
            <label for="descripcion">Descripción</label>
            <textarea id="descripcion" rows="3" placeholder="Sabor, ingredientes, edad recomendada..."></textarea>
          </div>
        </div>
        
        <div class="btn-group" style="margin-top: 28px;">
          <button id="btnGuardar" type="submit">
            Guardar Producto
          </button>
          <button id="btnCancelar" type="button" class="secondary">Cancelar</button>
        </div>
      </form>
      
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
