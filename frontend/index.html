<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tienda de Alimentos para Perritos 🐶</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <style>
    /* --- VARIABLES DE DISEÑO (Para fácil mantenimiento de colores) --- */
    :root {
      --primary-color: #2563eb;     /* Azul principal */
      --primary-hover: #1d4ed8;     /* Azul oscuro para hover */
      --secondary-color: #4b5563;   /* Gris secundario */
      --secondary-hover: #374151;   /* Gris oscuro para hover */
      --danger-color: #dc2626;      /* Rojo para acciones destructivas */
      --danger-hover: #b91c1c;     /* Rojo oscuro para hover */
      --success-color: #16a34a;     /* Verde para mensajes de éxito */
      --bg-body: #f8fafc;           /* Fondo general claro de la app */
      --bg-card: #ffffff;           /* Fondo de los contenedores blancos */
      --text-main: #1e293b;         /* Color principal del texto */
      --border-color: #e2e8f0;      /* Gris suave para bordes y líneas */
    }

    /* --- ESTILOS GENERALES Y RESETEO --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.5;
    }

    /* --- ENCABEZADO (HEADER) --- */
    header {
      background: linear-gradient(135deg, var(--primary-color), #3b82f6);
      color: white;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    header h1 {
      margin: 0 0 8px 0;
      font-size: 2.2rem;
      font-weight: 700;
    }

    header p {
      margin: 0;
      opacity: 0.9;
      font-size: 1rem;
    }

    /* --- CONTENEDOR PRINCIPAL (MAIN) --- */
    main {
      max-width: 1100px;
      margin: 30px auto;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 30px; /* Separación elegante entre secciones */
    }

    /* --- TARJETAS / SECCIONES (CARDS) --- */
    section {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border: 1px solid var(--border-color);
    }

    section h2 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 1.4rem;
      color: #0f172a;
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 8px;
    }

    /* --- COMPONENTES de BOTONES --- */
    .actions {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 18px;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
      background-color: var(--primary-color);
      color: white;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background-color: var(--secondary-color);
    }
    button.secondary:hover {
      background-color: var(--secondary-hover);
    }

    button.danger {
      background-color: var(--danger-color);
    }
    button.danger:hover {
      background-color: var(--danger-hover);
    }

    /* --- TABLA DE PRODUCTOS --- */
    .table-container {
      overflow-x: auto; /* Permite scroll horizontal en móviles si la tabla es grande */
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      text-align: left;
    }

    th, td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: #f1f5f9;
      color: #475569;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    tr:hover {
      background-color: #f8fafc; /* Efecto hover en las filas de la tabla */
    }

    /* --- FORMULARIO GRID CONTROLES --- */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    /* Elemento que ocupa todo el ancho del formulario (Descripción) */
    .full-width {
      grid-column: 1 / -1;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #475569;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.95rem;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background-color: #fff;
      box-sizing: border-box;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); /* Efecto focus moderno */
    }

    /* --- ESTADOS DE NOTIFICACIÓN --- */
    .status {
      margin-top: 14px;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 10px;
      border-radius: 6px;
      display: none; /* Se oculta por defecto */
    }

    .status.ok {
      display: block;
      color: #15803d;
      background-color: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .status.error {
      display: block;
      color: #b91c1c;
      background-color: #fef2f2;
      border: 1px solid #fca5a5;
    }
  </style>
</head>
<body>

  <header>
    <h1>Tienda de Alimentos para Perritos 🐶</h1>
    <p>Gestión CRUD de productos en contenedores Docker (Frontend + Backend + MySQL)</p>
  </header>

  <main>
    
    <section>
      <h2>Productos en Inventario</h2>
      <div class="actions">
        <button id="btnCargar">🔄 Cargar Productos</button>
      </div>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Precio</th>
              <th>Stock</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tbodyProductos">
            </tbody>
        </table>
      </div>
    </section>

    <section>
      <h2 id="formTitle">Nuevo Producto</h2>
      
      <div class="form-grid">
        <div class="form-group">
          <label for="nombre">Nombre del Producto</label>
          <input type="text" id="nombre" placeholder="Ej: Alimento Premium Cachorro" />
        </div>
        
        <div class="form-group">
          <label for="precio">Precio ($)</label>
          <input type="number" id="precio" step="0.01" min="0" placeholder="Ej: 19990" />
        </div>
        
        <div class="form-group">
          <label for="stock">Stock Disponible</label>
          <input type="number" id="stock" min="0" placeholder="Ej: 10" />
        </div>

        <div class="form-group full-width">
          <label for="descripcion">Descripción</label>
          <textarea id="descripcion" rows="3" placeholder="Ej: Sabor pollo, rico en proteínas, ideal para razas pequeñas..."></textarea>
        </div>
      </div>
      
      <div class="actions" style="margin-top: 20px;">
        <button id="btnGuardar">💾 Guardar Producto</button>
        <button id="btnCancelar" class="secondary">Cancelar</button>
      </div>
      
      <div id="status" class="status"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
