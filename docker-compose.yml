version: "3.9"

# ==============================================================
# Tienda Perritos - Entorno Local con Docker Compose
# Variables leidas desde .env (cultura DevOps: fuente unica de
# configuracion).
# Uso: docker compose up --build
# ==============================================================

services:

  # ----------------------------------------------------------------
  # Base de datos MySQL 8
  # ----------------------------------------------------------------
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: tienda-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${DB_PORT_EXPOSED}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tienda-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------------
  # Backend Node.js / Express
  # ----------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tienda-backend
    restart: unless-stopped
    environment:
      PORT: ${PORT}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
    ports:
      - "${BACKEND_PORT}:3001"
    networks:
      - tienda-net
    depends_on:
      db:
        condition: service_healthy

  # ----------------------------------------------------------------
  # Frontend Nginx (HTML / JS estatico)
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tienda-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - tienda-net
    depends_on:
      - backend

# ----------------------------------------------------------------
# Volumen persistente para MySQL
# ----------------------------------------------------------------
volumes:
  mysql_data:

# ----------------------------------------------------------------
# Red interna compartida entre servicios
# ----------------------------------------------------------------
networks:
  tienda-net:
    driver: bridge
