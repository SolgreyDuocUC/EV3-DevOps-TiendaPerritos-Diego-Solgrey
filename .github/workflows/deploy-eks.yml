name: CI/CD Tienda Perritos - ECS Fargate

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

env:
  ECR_REPO_FRONTEND: tienda-perritos-frontend
  ECR_REPO_BACKEND:  tienda-perritos-backend
  ECR_REPO_DB:       tienda-perritos-db
  AWS_CLUSTER:       cluster-tienda-perritos

jobs:

  build:
    name: Build y Push a ECR
    runs-on: ubuntu-latest

    outputs:
      image_tag:    ${{ steps.set-tag.outputs.image_tag }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir tag de imagen (SHA corto del commit)
        id: set-tag
        run: |
          TAG=${GITHUB_SHA::7}
          echo "IMAGE_TAG=${TAG}" >> $GITHUB_ENV
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build y push DB
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_DB:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO_DB:latest \
                       ./db
          docker push $ECR_REGISTRY/$ECR_REPO_DB:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_DB:latest

      - name: Build y push BACKEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_BACKEND:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO_BACKEND:latest \
                       ./backend
          docker push $ECR_REGISTRY/$ECR_REPO_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_BACKEND:latest

      - name: Build y push FRONTEND
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG \
                       -t $ECR_REGISTRY/$ECR_REPO_FRONTEND:latest \
                       ./frontend
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPO_FRONTEND:latest

  deploy:
    name: Despliegue en AWS ECS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Forzar despliegue DB
        run: |
          aws ecs update-service \
            --cluster $AWS_CLUSTER \
            --service td-tienda-perritos-db-service-n8p6e87s \
            --force-new-deployment

      - name: Forzar despliegue BACKEND
        run: |
          aws ecs update-service \
            --cluster $AWS_CLUSTER \
            --service service-tienda-perritos-backend \
            --force-new-deployment

      - name: Forzar despliegue FRONTEND
        run: |
          aws ecs update-service \
            --cluster $AWS_CLUSTER \
            --service td-tienda-perritos-frontend-service-qscjzjji \
            --force-new-deployment